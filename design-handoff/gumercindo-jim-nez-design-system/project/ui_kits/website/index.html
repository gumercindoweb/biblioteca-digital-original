<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gumercindo Jiménez — Consultoría</title>
<link rel="icon" href="../../assets/logo/favicon.png" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; }
  body { background: var(--surface-page); }
  a { cursor: pointer; }
  a:hover { color: var(--text-brand); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="sections.jsx"></script>
<script type="text/babel">
const { Nav, Hero, About, Services, Testimonials, FAQ, AuditBand, Footer, AuditModal } = window.GJSite;
function Site() {
  const [audit, setAudit] = React.useState(false);
  const open = () => setAudit(true);
  return (
    <React.Fragment>
      <Nav onAudit={open} />
      <main>
        <Hero onAudit={open} />
        <About />
        <Services />
        <Testimonials />
        <FAQ />
        <AuditBand onAudit={open} />
      </main>
      <Footer />
      <AuditModal open={audit} onClose={() => setAudit(false)} />
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Site />);
</script>
</body>
</html>
