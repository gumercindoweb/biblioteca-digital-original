<!DOCTYPE html><html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--surface-inverse);padding:28px 32px;}
  .ey{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-400);margin-bottom:14px;}
  .q{font-family:var(--font-display);font-style:italic;font-weight:500;font-size:30px;line-height:1.18;color:var(--bone-50);margin:0 0 20px;max-width:30ch;}
  .axes{display:flex;flex-wrap:wrap;gap:10px;}
  .ax{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--green-900);background:var(--gold-400);padding:6px 12px;border-radius:var(--radius-pill);}
  .ax.alt{background:transparent;color:var(--text-on-dark-muted);border:1px solid var(--border-on-dark);}
</style></head><body>
<div class="ey">Arquetipo · El Forajido + El Mago</div>
<p class="q">"Al caos lo busco, y lo convierto en dinero."</p>
<div class="axes">
  <span class="ax">Cercana</span>
  <span class="ax">Divertida</span>
  <span class="ax">Disruptiva</span>
  <span class="ax">Técnica</span>
  <span class="ax alt">Alivio con autoridad</span>
</div>
</body></html>
