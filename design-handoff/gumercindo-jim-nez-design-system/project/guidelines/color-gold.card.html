<!DOCTYPE html><html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--surface-page);padding:22px;}
  .scale{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);}
  .sw{flex:1;height:106px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font-family:var(--font-sans);}
  .n{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;}
  .h{font-size:10px;opacity:.8;margin-top:2px;}
</style></head><body>
<div class="scale">
  <div class="sw" style="background:var(--gold-700);color:#f3e6cd"><span class="n">700</span><span class="h">#8A6D38</span></div>
  <div class="sw" style="background:var(--gold-600);color:#f6ecd6"><span class="n">600</span><span class="h">#A6843F</span></div>
  <div class="sw" style="background:var(--gold-500);color:#3d3018"><span class="n">500 ·</span><span class="h">Metal #B89455</span></div>
  <div class="sw" style="background:var(--gold-400);color:#41310f"><span class="n">400</span><span class="h">#CDAE74</span></div>
  <div class="sw" style="background:var(--gold-200);color:#7a6230"><span class="n">200</span><span class="h">#E7D8B8</span></div>
</div>
</body></html>
