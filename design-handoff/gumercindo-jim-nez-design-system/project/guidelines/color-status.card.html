<!-- @dsCard group="Colors" viewport="700x150" name="Status & Semantic" subtitle="Success, warning, danger — kept in the earthy family." -->
<!DOCTYPE html><html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--surface-page);padding:22px;font-family:var(--font-sans);}
  .row{display:flex;gap:14px;}
  .chip{flex:1;height:106px;border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:space-between;padding:12px;box-shadow:var(--shadow-sm);}
  .t{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;}
  .h{font-size:11px;opacity:.85;}
</style></head><body>
<div class="row">
  <div class="chip" style="background:var(--success);color:#eaf2ee"><span class="t">Success</span><span class="h">#166B4F</span></div>
  <div class="chip" style="background:var(--warning);color:#fff7e6"><span class="t">Warning</span><span class="h">#A6843F</span></div>
  <div class="chip" style="background:var(--danger);color:#ffe9e6"><span class="t">Danger</span><span class="h">#9E3B33</span></div>
  <div class="chip" style="background:var(--info);color:#cfe0d8"><span class="t">Info</span><span class="h">#11503D</span></div>
</div>
</body></html>
