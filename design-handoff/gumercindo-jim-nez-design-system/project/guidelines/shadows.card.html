<!-- @dsCard group="Spacing" viewport="700x170" name="Shadows" subtitle="Soft, warm, low. Elevation whispers." -->
<!DOCTYPE html><html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--surface-page);padding:30px;font-family:var(--font-sans);}
  .row{display:flex;gap:26px;align-items:center;justify-content:space-between;}
  .col{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .box{width:92px;height:64px;background:var(--surface-raised);border-radius:var(--radius-md);}
  .n{font-size:10px;color:var(--text-muted);font-weight:600;letter-spacing:.06em;text-transform:uppercase;}
</style></head><body>
<div class="row">
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="n">xs</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="n">sm</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="n">md</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="n">lg</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="n">xl</span></div>
</div>
</body></html>
