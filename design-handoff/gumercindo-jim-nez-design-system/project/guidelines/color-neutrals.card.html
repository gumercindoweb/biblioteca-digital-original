<!-- @dsCard group="Colors" viewport="700x170" name="Neutrals — Warm Earth" subtitle="Ivory paper to warm ink. Never cold grey." -->
<!DOCTYPE html><html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--surface-page);padding:22px;}
  .scale{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid var(--border-soft);}
  .sw{flex:1;height:120px;display:flex;flex-direction:column;justify-content:flex-end;padding:9px;font-family:var(--font-sans);}
  .n{font-size:10px;font-weight:600;letter-spacing:.06em;}
  .h{font-size:9px;opacity:.75;margin-top:2px;}
</style></head><body>
<div class="scale">
  <div class="sw" style="background:var(--bone-50);color:#5e5645"><span class="n">Bone 50</span><span class="h">#F8F5EE</span></div>
  <div class="sw" style="background:var(--bone-100);color:#5e5645"><span class="n">Bone 100</span><span class="h">#F1ECE0</span></div>
  <div class="sw" style="background:var(--sand-200);color:#5e5645"><span class="n">Sand 200</span><span class="h">#E5DDCC</span></div>
  <div class="sw" style="background:var(--stone-300);color:#3d3829"><span class="n">Stone 300</span><span class="h">#D2C8B2</span></div>
  <div class="sw" style="background:var(--khaki-400);color:#221f17"><span class="n">Khaki 400</span><span class="h">#B2A789</span></div>
  <div class="sw" style="background:var(--earth-500);color:#f8f5ee"><span class="n">Earth 500</span><span class="h">#897F66</span></div>
  <div class="sw" style="background:var(--bark-600);color:#f1ece0"><span class="n">Bark 600</span><span class="h">#5E5645</span></div>
  <div class="sw" style="background:var(--umber-700);color:#e5ddcc"><span class="n">Umber 700</span><span class="h">#3D3829</span></div>
  <div class="sw" style="background:var(--ink-800);color:#e5ddcc"><span class="n">Ink 800</span><span class="h">#221F17</span></div>
  <div class="sw" style="background:var(--ink-900);color:#c9bfa9"><span class="n">Ink 900</span><span class="h">#15130D</span></div>
</div>
</body></html>
