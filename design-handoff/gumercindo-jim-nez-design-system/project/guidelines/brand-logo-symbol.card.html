<!DOCTYPE html><html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--surface-page);padding:24px 30px;font-family:var(--font-sans);}
  .row{display:flex;gap:18px;}
  .tile{flex:1;height:128px;border-radius:var(--radius-md);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;box-shadow:var(--shadow-sm);}
  .tile img{height:62px;width:auto;}
  .cap{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;}
</style></head><body>
<div class="row">
  <div class="tile" style="background:var(--bone-50);border:1px solid var(--border-soft)"><img src="../assets/logo/gj-symbol-green.png" alt="GJ verde" /><span class="cap" style="color:var(--text-faint)">Green / paper</span></div>
  <div class="tile" style="background:var(--green-900)"><img src="../assets/logo/gj-symbol-ivory.png" alt="GJ marfil" /><span class="cap" style="color:var(--text-on-dark-muted)">Ivory / dark</span></div>
  <div class="tile" style="background:var(--green-950)"><img src="../assets/logo/gj-symbol-gold.png" alt="GJ oro" /><span class="cap" style="color:var(--gold-400)">Gold / deep</span></div>
  <div class="tile" style="background:#fff;border:1px solid var(--border-soft)"><img src="../assets/logo/gj-symbol-black.png" alt="GJ negro" style="height:24px" /><span class="cap" style="color:var(--text-faint)">Flat black · 16px</span></div>
</div>
</body></html>
