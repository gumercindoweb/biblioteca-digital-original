<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing Scale" subtitle="4pt base. Generous whitespace is the luxury." -->
<!DOCTYPE html><html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--surface-page);padding:24px 30px;font-family:var(--font-sans);}
  .row{display:flex;align-items:flex-end;gap:14px;}
  .col{display:flex;flex-direction:column;align-items:center;gap:7px;}
  .bar{background:var(--green-700);border-radius:2px;width:22px;}
  .n{font-size:10px;color:var(--text-muted);font-weight:600;}
  .px{font-size:9px;color:var(--text-faint);}
</style></head><body>
<div class="row">
  <div class="col"><div class="bar" style="height:8px"></div><span class="n">2</span><span class="px">8</span></div>
  <div class="col"><div class="bar" style="height:16px"></div><span class="n">4</span><span class="px">16</span></div>
  <div class="col"><div class="bar" style="height:24px"></div><span class="n">5</span><span class="px">24</span></div>
  <div class="col"><div class="bar" style="height:32px"></div><span class="n">6</span><span class="px">32</span></div>
  <div class="col"><div class="bar" style="height:48px"></div><span class="n">8</span><span class="px">48</span></div>
  <div class="col"><div class="bar" style="height:64px"></div><span class="n">9</span><span class="px">64</span></div>
  <div class="col"><div class="bar" style="height:80px"></div><span class="n">10</span><span class="px">80</span></div>
  <div class="col"><div class="bar" style="height:96px"></div><span class="n">11</span><span class="px">96</span></div>
</div>
</body></html>
