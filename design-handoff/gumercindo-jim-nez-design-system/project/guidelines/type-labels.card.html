<!-- @dsCard group="Type" viewport="700x180" name="Labels — Hanken Grotesk" subtitle="Tracked uppercase sans for eyebrows, UI and metadata." -->
<!DOCTYPE html><html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--surface-page);padding:26px 30px;font-family:var(--font-sans);}
  .ey{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint);margin-bottom:18px;}
  .stack{display:flex;flex-direction:column;gap:14px;}
  .s{display:flex;align-items:baseline;gap:16px;}
  .tag{font-size:10px;color:var(--text-faint);width:120px;flex:none;letter-spacing:.04em;}
  .eyebrow{font-size:12px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--text-accent);}
  .label{font-size:14px;font-weight:500;color:var(--text-body);}
  .btn{font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-brand);}
</style></head><body>
<div class="ey">Labels · Hanken Grotesk</div>
<div class="stack">
  <div class="s"><span class="tag">Eyebrow · .16em</span><span class="eyebrow">Consultoría de marca</span></div>
  <div class="s"><span class="tag">UI label · 500</span><span class="label">Solicitar una auditoría</span></div>
  <div class="s"><span class="tag">Button · .06em caps</span><span class="btn">Trabaja conmigo</span></div>
</div>
</body></html>
