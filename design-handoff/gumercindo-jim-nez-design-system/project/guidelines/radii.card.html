<!-- @dsCard group="Spacing" viewport="700x150" name="Radii" subtitle="Restrained corners — editorial, not bubbly." -->
<!DOCTYPE html><html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--surface-page);padding:24px 30px;font-family:var(--font-sans);}
  .row{display:flex;gap:22px;align-items:flex-end;}
  .col{display:flex;flex-direction:column;align-items:center;gap:9px;}
  .box{width:84px;height:60px;background:var(--surface-raised);border:1px solid var(--border-strong);box-shadow:var(--shadow-sm);}
  .n{font-size:10px;color:var(--text-muted);font-weight:600;letter-spacing:.04em;}
  .v{font-size:9px;color:var(--text-faint);}
</style></head><body>
<div class="row">
  <div class="col"><div class="box" style="border-radius:var(--radius-none)"></div><span class="n">none</span><span class="v">0</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="n">xs</span><span class="v">2px</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="n">sm</span><span class="v">4px</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><span class="n">md · card</span><span class="v">8px</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="n">lg</span><span class="v">14px</span></div>
  <div class="col"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="n">xl</span><span class="v">22px</span></div>
  <div class="col"><div class="box" style="width:60px;border-radius:var(--radius-pill)"></div><span class="n">pill</span><span class="v">999</span></div>
</div>
</body></html>
