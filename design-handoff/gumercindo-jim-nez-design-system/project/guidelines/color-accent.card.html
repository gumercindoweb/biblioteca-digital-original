<!DOCTYPE html><html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--surface-page);padding:22px;}
  .scale{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);}
  .sw{flex:1;height:106px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font-family:var(--font-sans);}
  .n{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;}
  .h{font-size:10px;opacity:.8;margin-top:2px;}
</style></head><body>
<div class="scale">
  <div class="sw" style="background:var(--clay-700);color:#f6ddd9"><span class="n">700</span><span class="h">#8F3B36</span></div>
  <div class="sw" style="background:var(--clay-600);color:#f7e2dd"><span class="n">600</span><span class="h">#AB4A40</span></div>
  <div class="sw" style="background:var(--clay-500);color:#3a0f0c"><span class="n">500 ·</span><span class="h">Accent #BE5A53</span></div>
  <div class="sw" style="background:var(--clay-300);color:#5e211c"><span class="n">300</span><span class="h">#DFA59B</span></div>
  <div class="sw" style="background:var(--clay-100);color:#8f3b36"><span class="n">100</span><span class="h">#F3DED9</span></div>
</div>
</body></html>
