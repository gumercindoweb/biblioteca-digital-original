<!DOCTYPE html><html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--surface-page);padding:22px;font-family:var(--font-sans);}
  .scale{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);}
  .sw{flex:1;height:112px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;}
  .n{font-size:10px;font-weight:600;letter-spacing:.06em;}
  .h{font-size:9px;opacity:.82;margin-top:2px;}
</style></head><body>
<div class="scale">
  <div class="sw" style="background:var(--imprint-gold);color:#3a2c0a"><span class="n">Oro imprenta</span><span class="h">#E5B83C</span></div>
  <div class="sw" style="background:var(--imprint-gold-soft);color:#5a4410"><span class="n">Oro suave</span><span class="h">#F5D47A</span></div>
  <div class="sw" style="background:var(--violet-900);color:#c5a8e8"><span class="n">Violeta 900</span><span class="h">#1A0A30</span></div>
  <div class="sw" style="background:var(--violet-800);color:#e6d6ff"><span class="n">800</span><span class="h">#3D0875</span></div>
  <div class="sw" style="background:var(--violet-700);color:#f3eeff"><span class="n">700 · diario</span><span class="h">#5B0FAF</span></div>
  <div class="sw" style="background:var(--violet-600);color:#1a0a30"><span class="n">600</span><span class="h">#7B2FD0</span></div>
  <div class="sw" style="background:var(--violet-200);color:#3d0875"><span class="n">200 · líneas</span><span class="h">#C5A8E8</span></div>
  <div class="sw" style="background:var(--violet-50);color:#5b0faf"><span class="n">50 · tint</span><span class="h">#F3EEFF</span></div>
</div>
</body></html>
