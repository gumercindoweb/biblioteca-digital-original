<!DOCTYPE html><html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--surface-page);padding:24px 30px;}
  .row{display:flex;align-items:baseline;gap:18px;border-bottom:1px solid var(--border-hair);padding:7px 0;}
  .tok{font-family:var(--font-sans);font-size:10px;color:var(--text-faint);width:130px;flex:none;letter-spacing:.04em;}
  .ex{font-family:var(--font-display);color:var(--text-strong);line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
</style></head><body>
<div class="row"><span class="tok">5xl · 84px</span><span class="ex" style="font-size:54px;font-weight:600">Autoridad</span></div>
<div class="row"><span class="tok">3xl · 48px</span><span class="ex" style="font-size:42px;font-weight:600">El método gana</span></div>
<div class="row"><span class="tok">2xl · 36px</span><span class="ex" style="font-size:32px;font-weight:500">Claridad inmediata</span></div>
<div class="row"><span class="tok">xl · 28px</span><span class="ex" style="font-size:26px;font-weight:500">Sistemas rentables</span></div>
<div class="row"><span class="tok">lg · 22px</span><span class="ex" style="font-size:22px;font-family:var(--font-serif)">Del caos al orden y al dinero</span></div>
<div class="row"><span class="tok">base · 16px</span><span class="ex" style="font-size:16px;font-family:var(--font-serif);font-weight:400">Resuelvo en la práctica, no desde un libro.</span></div>
<div class="row" style="border:none"><span class="tok">xs · 12px caps</span><span class="ex" style="font-size:12px;font-family:var(--font-sans);font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text-accent)">Eyebrow</span></div>
</body></html>
