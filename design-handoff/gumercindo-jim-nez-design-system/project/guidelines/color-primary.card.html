<!DOCTYPE html><html lang="es"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;background:var(--surface-page);padding:22px;}
  .scale{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-sm);}
  .sw{flex:1;height:106px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font-family:var(--font-sans);}
  .n{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;}
  .h{font-size:10px;opacity:.8;margin-top:2px;}
</style></head><body>
<div class="scale">
  <div class="sw" style="background:var(--green-950);color:#9fb3aa"><span class="n">950</span><span class="h">#07211A</span></div>
  <div class="sw" style="background:var(--green-900);color:#9fb3aa"><span class="n">900</span><span class="h">#0A2E25</span></div>
  <div class="sw" style="background:var(--green-800);color:#bcd0c7"><span class="n">800</span><span class="h">#0E3B2E</span></div>
  <div class="sw" style="background:var(--green-700);color:#cfe0d8"><span class="n">700 ·</span><span class="h">Brand #11503D</span></div>
  <div class="sw" style="background:var(--green-600);color:#d9e8e0"><span class="n">600</span><span class="h">#166B4F</span></div>
  <div class="sw" style="background:var(--green-500);color:#06241b"><span class="n">500</span><span class="h">#1E8A66</span></div>
  <div class="sw" style="background:var(--green-200);color:#0e3b2e"><span class="n">200</span><span class="h">#BFD9CD</span></div>
  <div class="sw" style="background:var(--green-50);color:#11503d"><span class="n">50</span><span class="h">#EAF2EE</span></div>
</div>
</body></html>
